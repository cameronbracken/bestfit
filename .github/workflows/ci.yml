name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # Guard: the vendored core copies and the shipped fixtures must match the
  # canonical sources. Fails the whole pipeline early on any drift.
  sync-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check vendored core is in sync
        run: python3 tools/sync_core.py --check
      - name: Check fixtures are in sync
        run: python3 tools/sync_fixtures.py --check

  # C++ core: build and run the doctest/fixture suites on all three platforms.
  core:
    needs: sync-check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S core -B core/build
      - name: Build
        run: cmake --build core/build --config Release
      - name: Test
        run: ctest --test-dir core/build --build-config Release --output-on-failure

  # R package: R CMD check on the three platforms.
  r-cmd-check:
    needs: sync-check
    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: ubuntu-latest,  r: "release" }
          - { os: macos-latest,   r: "release" }
          - { os: windows-latest, r: "release" }
    runs-on: ${{ matrix.config.os }}
    defaults:
      run:
        working-directory: bestfitr
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true
      - uses: r-lib/actions/setup-tinytex@v2
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check
          working-directory: bestfitr
      - uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: bestfitr
          upload-snapshots: true
          build_args: 'character()'

  # Python package: build from source and run pytest on the three platforms.
  python:
    needs: sync-check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build and install
        run: python -m pip install ./bestfitpy
      - name: Install test deps
        run: python -m pip install pytest numpy
      - name: Test
        run: python -m pytest bestfitpy/tests -q
