name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # C++ core: build and run the doctest/fixture suites on all three platforms.
  # (Builds core/ directly; no vendoring involved.)
  core:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S core -B core/build
      - name: Build
        run: cmake --build core/build --config Release
      - name: Test
        run: ctest --test-dir core/build --build-config Release --output-on-failure

  # R package: R CMD check on the three platforms.
  r-cmd-check:
    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: ubuntu-latest,  r: "release" }
          - { os: macos-latest,   r: "release" }
          - { os: windows-latest, r: "release" }
    runs-on: ${{ matrix.config.os }}
    defaults:
      run:
        working-directory: bestfitr
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
    steps:
      - uses: actions/checkout@v4
      # The vendored core is a subtree symlink into core/. On Windows a checkout may
      # materialize it as a text stub rather than a real link, so dereference to real
      # files before R CMD build (build-first also strips symlinks for the tarball).
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Materialize shared core (dereference symlinks)
        working-directory: ${{ github.workspace }}
        run: python tools/materialize_core.py
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true
      - uses: r-lib/actions/setup-tinytex@v2
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check
          working-directory: bestfitr
      - uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: bestfitr
          upload-snapshots: true
          build_args: 'character()'

  # Python package: build from source and run pytest on the three platforms.
  python:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # Dereference the vendored-core symlinks to real files so the source build is
      # self-contained on every OS (Windows may check the symlink out as a text stub).
      - name: Materialize shared core (dereference symlinks)
        run: python tools/materialize_core.py
      - name: Build and install
        run: python -m pip install ./bestfitpy
      - name: Install test deps
        run: python -m pip install pytest numpy
      - name: Test
        run: python -m pytest bestfitpy/tests -q
